<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProConnect</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        img {
            overflow-clip-margin: content-box;
            overflow: clip;
        }
    </style>
</head>

<body class="bg-[#f6f7fb]">

    <!-- Navbar -->
    <header class="flex justify-between items-center px-8 py-3 bg-white border-b">

        <!-- Logo -->
        <div class="flex items-center">
            <img src="../assets/download.png" alt="logo" class="h-8 object-contain">
            <img src="../assets/line.png" alt="logo" class="h-8  ms-2 object-contain">
        </div>

        <!-- Icons Section Container -->
        <div class="flex items-center gap-6">

            <!-- 1. Phone Icon -->
            <button class="text-black hover:opacity-70 transition-opacity focus:outline-none">
                <svg xmlns="http://w3.org" width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
                    <path
                        d="M20 22.621l-3.521-6.795c-.008.004-1.974.97-2.064 1.011-2.24 1.086-6.799-7.82-4.559-8.907.03-.015 1.996-.981 1.996-.981l-3.522-6.949s-1.425.688-2.023 1.01c-1.127.604-3.665 1.838-4.307 4.156-.24 1.081-.662 5.064 3.731 12.703 3.642 6.331 8.355 9.155 11.837 9.155 2.14 0 3.774-1.637 4.432-2.588.583-.842 1.996-2.815 1.996-2.815z" />
                </svg>
            </button>

            <!-- 2. Notification Bell (With Red Dot) -->
            <button class="relative text-black hover:opacity-70 transition-opacity focus:outline-none">
                <svg xmlns="http://w3.org" width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
                    <path
                        d="M12 24c1.23 0 2.25-1.02 2.25-2.25h-4.5c0 1.23 1.02 2.25 2.25 2.25zm6.75-6.75V11c0-3.45-1.83-6.33-5.06-7.1V3c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.9c-3.23.77-5.06 3.65-5.06 7.1v6.25L4 20.25v.75h16v-.75l-1.25-1.5z" />
                </svg>
                <!-- Red Dot Positioning Fix -->
                <span
                    class="absolute -top-0.5 -right-0.5 h-2.5 w-2.5 bg-red-500 rounded-full border-2 border-white"></span>
            </button>

            <!-- 3. User Profile Icon -->
            <div
                class="h-9 w-9 rounded-full bg-[#E5E7EB] flex items-center justify-center cursor-pointer hover:bg-gray-300 transition-colors overflow-hidden">
                <svg xmlns="http://w3.org" width="24" height="24" viewBox="0 0 24 24" fill="#9CA3AF">
                    <path
                        d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" />
                </svg>
            </div>

        </div>


    </header>

    <!-- Main -->
    <section class="flex flex-col items-center text-center mt-20 px-4">

        <!-- Heading -->
        <h1 class="text-3xl md:text-4xl font-semibold text-[#1f2a44] leading-snug max-w-2xl">
            Your one-stop hub for building your career and staying connected
        </h1>

        <!-- Subtext -->
        <p class="mt-5 text-gray-500 text-base">
            Select Your Module
        </p>

        <!-- Card Container -->
        <div
            class="mt-10 w-[320px] rounded-[30px] overflow-hidden shadow-[0_10px_25px_rgba(0,0,0,0.08)] bg-white font-sans">

            <!-- Top Image Section (Fixed Image Fit) -->
            <div class="bg-gradient-to-b from-[#f8d2b8] to-[#fbe4d7] h-[180px] w-full overflow-hidden">
                <img src="../assets/DigitalLearningCardImage-C-SV9S0l.png" alt="Digital Learning"
                    class="w-full h-full object-cover object-center">
            </div>

            <!-- Bottom Content Section -->
            <div class="bg-white px-6 py-6">

                <h2 class="text-[20px] font-bold text-[#1a2b4b] tracking-tight">
                    Digital Learning
                </h2>

                <p class="text-[14px] text-gray-500 mt-2.5 leading-relaxed font-medium">
                    Elevate your skills with interactive courses and unlock your creative potential!
                </p>

                <!-- Call to Action (CTA) -->
                <div class="flex justify-between items-center mt-6">

                    <!-- <span
                        class="text-[#f58d67] text-[14.5px] font-bold cursor-pointer hover:opacity-80 transition-opacity">
                        Step into Learning!
                    </span> -->
                    <a href="../dashboard/coursedetails.html" class="text-orange-500 text-sm">Step into Learning!</a>
                    <button onclick="window.location.href='../dashboard/coursedetails.html'"
                        class="h-9 w-9 flex items-center justify-center border-2 border-[#f58d67] rounded-full text-[#f58d67] hover:bg-[#fff5f0] transition-all duration-300">

                        <span class="text-[20px] leading-none mb-0.5 ml-0.5">↗</span>

                    </button>
                </div>

            </div>

        </div>

    </section>

    <!-- Floating Ask Me -->
    <div class="fixed right-0 top-1/2 -translate-y-1/2">
        <button
            class="bg-orange-500 text-white px-3 py-2 rounded-l-lg shadow-md rotate-90 origin-bottom-right hover:bg-orange-600 transition">
            Ask Me
        </button>
    </div>

</body>

</html>
