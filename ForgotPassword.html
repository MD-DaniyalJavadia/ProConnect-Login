<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Forgot Password</title>
    <!-- Icons -->

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            background: #f5f5f5;
        }

        .loader-spinner {
            border-top-color: rgb(243, 113, 32);
            /* orange color */
        }

        /* LEFT SLIDER */
        .left-section {
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        .left-section img {
            width: 100%;
            height: 100vh;
            object-fit: cover;
            position: absolute;
            opacity: 0;
            transition: opacity 1s ease-in-out;
        }

        .left-section img.active {
            opacity: 1;
        }

        /* RIGHT SIDE */
        .right-section {
            height: 100vh;
            background: #f2f3f5;
        }

        .form-floating>label {
            color: #999;
        }

        .form-control:focus {
            border-color: #ff7a2f;
            box-shadow: 0 0 0 0.1rem rgba(255, 122, 47, 0.25);
        }


        .submit-btn {
            transition: all 0.3s ease;
        }

        .submit-btn {
            background: #f4c2a1;
            /* light orange */
            color: white;
            font-weight: 600;
            opacity: 1;
            /* opacity kam nahi karni warna dull lagta hai */
            cursor: not-allowed;
            transition: all 0.3s ease;
        }

        .submit-btn:disabled {
            background: #f4c2a1 !important;
            color: white !important;
            opacity: 1;
            cursor: not-allowed;
        }

        .submit-btn.active {
            background: #F37120;
            color: white;
            cursor: pointer;
        }

        .submit-btn.active:hover {
            background: #d96d2f;
        }

        .submit-btn:hover {
            background: #d98c5f;
        }


        .logo {
            width: 140px;
        }

        .form-box {
            max-width: 350px;
            width: 100%;
        }

        /* BUTTON */
        .submit-btn {
            background: #f4a373;
            color: white;
            font-weight: 600;
            border: none;
        }

        .submit-btn:hover {
            background: #e38b5c;
        }

        /* BACK BTN */
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 22px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div id="loader" style="
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #fff;
    z-index: 9999;
    transition: opacity 0.5s ease;
">
        <img src="./assets/loader-DsU7QgP1.gif" alt="Loading..." class="w-16 h-16 mb-4">
        <span class="text-gray-700 text-lg font-medium text-center px-4">
            <strong>HANG TIGHT!</strong> We’re putting the final touches on your page.
        </span>
    </div>
    <div class="container-fluid">

        <div class="row">

            <!-- LEFT IMAGE SLIDER -->
            <div class="col-md-7 left-section p-0">

                <img src="assets/img1.jpg" class="active">
                <img src="assets/img2.jpg">
                <img src="assets/img3.jpg">

            </div>

            <div class="col-md-5 right-section d-flex flex-column align-items-center position-relative">



                <div class="back-btn" onclick="goBack()" role="button" tabindex="0" aria-label="Go back">
                    <i class="bi bi-arrow-left"></i>
                </div>

                <!-- Back Button -->
                <!-- <div class="back-btn" onclick="goBack()">←</div> -->

                <!-- TOP LOGO -->
                <div class="w-100 text-center mt-4">
                    <img src="./assets/download.png" class="logo">
                </div>

                <!-- CENTER CONTENT -->
                <div
                    class="form-box text-center d-flex flex-column align-items-center justify-content-center flex-grow-1">

                    <!-- Illustration -->
                    <img src="assets/forgotpassword1-DY3L2xE7.png" style="width:120px;" class="mb-3">

                    <h3 class="fw-bold">Forgot Password?</h3>
                    <p class="text-muted mb-4">Enter your User ID.</p>

                    <!-- Input -->
                    <div class="form-floating w-100 mb-5">
                        <input type="text" class="form-control" id="userId" placeholder="User ID">
                        <label for="userId">User ID</label>
                    </div>

                    <!-- Button -->
                    <button id="SumbitBtn" class="btn submit-btn w-100 py-2 mb-3" disabled>
                        SUBMIT
                    </button>

                    <!-- Login link -->
                    <p class="text-muted">
                        Remember Password?
                        <a href="login.html" style="color:#f4a373; text-decoration:none;">
                            Log In
                        </a>
                    </p>

                </div>

            </div>

        </div>
    </div>

    <script>
        // IMAGE SLIDER
        let slides = document.querySelectorAll(".left-section img");
        let index = 0;

        setInterval(() => {
            slides[index].classList.remove("active");
            index = (index + 1) % slides.length;
            slides[index].classList.add("active");
        }, 3000);

        // BACK BUTTON
        function goBack() {
            document.querySelector('.back-btn').addEventListener('click', function () {
                // Check if there is a referrer (user came from another page)
                if (document.referrer && document.referrer !== "") {
                    window.history.back();
                } else {
                    // Fallback: If direct URL hit, go to your login page
                    window.location.href = "login.html";
                }
            });
            const backBtn = document.getElementsByClassName('back-btn')[0]; // pick the first element

            backBtn.addEventListener('click', () => {
                window.location.href = 'login.html';
            });
        }
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loader').style.display = 'none';
            }, 3000); // 3000 milliseconds = 3 seconds
        });
        const userId = document.getElementById("userId");
        const SumbitBtn = document.getElementById("SumbitBtn");

        userId.addEventListener("input", checkInputs);

        function checkInputs() {
            if (userId.value.trim() !== "") {
                SumbitBtn.disabled = false;
                SumbitBtn.classList.add("active");
            } else {
                SumbitBtn.disabled = true;
                SumbitBtn.classList.remove("active");
            }
        }


    </script>

</body>

</html>
